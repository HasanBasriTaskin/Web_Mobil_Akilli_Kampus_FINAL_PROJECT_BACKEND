name: Deploy via FTP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: 📝 Prepare appsettings.json
        run: |
          cp SMARTCAMPUS.API/appsettings.example.json SMARTCAMPUS.API/appsettings.json
          
          sudo apt-get update && sudo apt-get install -y jq
          
          jq '.EmailSettings.Host = "${{ secrets.SMTP_HOST }}" | 
              .EmailSettings.Port = ${{ secrets.SMTP_PORT }} | 
              .EmailSettings.EnableSsl = true |
              .EmailSettings.FromEmail = "${{ secrets.SMTP_FROM_EMAIL }}" | 
              .EmailSettings.Username = "${{ secrets.SMTP_USERNAME }}" | 
              .EmailSettings.Password = "${{ secrets.SMTP_PASSWORD }}" |
              .IyzicoSettings.ApiKey = "${{ secrets.IYZICO_API_KEY }}" |
              .IyzicoSettings.SecretKey = "${{ secrets.IYZICO_SECRET_KEY }}" |
              .IyzicoSettings.BaseUrl = "https://sandbox-api.iyzipay.com" |
              .ConnectionStrings.DefaultConnection = "Server=localhost;Database=${{ secrets.DB_NAME }};User=${{ secrets.DB_USER }};Password=${{ secrets.DB_PASSWORD }};" |
              .JwtSettings.Secret = "${{ secrets.JWT_SECRET }}"' \
              SMARTCAMPUS.API/appsettings.json > SMARTCAMPUS.API/appsettings.tmp.json && \
              mv SMARTCAMPUS.API/appsettings.tmp.json SMARTCAMPUS.API/appsettings.json

      - name: 🛠️ Restore & Publish .NET Project
        run: dotnet publish SMARTCAMPUS.API/SMARTCAMPUS.API.csproj -c Release -o ./publish

      - name: 🚀 Upload to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: /httpdocs/
